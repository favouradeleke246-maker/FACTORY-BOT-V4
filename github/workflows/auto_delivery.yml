name: Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'   # once per day at 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Generate new game
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN:           ${{ secrets.GH_TOKEN }}
          GAME_PRICE:         ${{ secrets.GAME_PRICE }}
        run: python levelforge_github.py
      - name: Commit & push
        run: |
          git config user.name "DeathRoll Bot"
          git config user.email "bot@deathroll.co"
          git add portfolio.json workspace/ index.html learning_data.json sar_analysis.json
          git diff --staged --quiet || git commit -m "Auto: new game $(date +'%Y-%m-%d')"
          git push
