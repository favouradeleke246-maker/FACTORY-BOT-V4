<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="60">
    <title>DeathRoll Studio Dashboard</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 20px; }
        pre { background: #111; padding: 15px; border-radius: 10px; overflow-x: auto; }
        h1 { color: #ff6b6b; }
    </style>
</head>
<body>
    <h1>🔥 DeathRoll Studio Dashboard</h1>
    <p>Last updated: <span id="time"></span></p>
    <pre id="data">Loading...</pre>
    
    <script>
        fetch('portfolio.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                document.getElementById('time').textContent = new Date().toLocaleString();
                document.getElementById('data').textContent = JSON.stringify(data, null, 2);
            })
            .catch(() => {
                document.getElementById('data').textContent = 'Error loading data';
            });
    </script>
</body>
</html>
