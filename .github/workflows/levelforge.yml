name: DeathRoll Studio Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  create-games:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pillow requests
    
    - name: Run Game Factory
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        GAME_PRICE: ${{ secrets.GAME_PRICE }}
      run: python levelforge_github.py
    
    - name: Create .nojekyll for GitHub Pages
      run: touch .nojekyll
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add .nojekyll portfolio.json games_log.txt last_run.txt last_update.txt sar_analysis.json learning_data.json build_info.txt openai_cache.json recent_names.txt last_hook.txt last_style.txt 2>/dev/null || true
        git add workspace/ --force
        git add index.html dashboard.html 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "Changes pushed successfully"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: game-output
        path: |
          portfolio.json
          games_log.txt
          sar_analysis.json
          learning_data.json
          build_info.txt
          workspace/
