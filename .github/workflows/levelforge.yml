name: DeathRoll Studio Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  create-games:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pillow requests
    
    - name: Run Game Factory
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        GAME_PRICE: ${{ secrets.GAME_PRICE }}
      run: python levelforge_github.py
    
    - name: Show verification
      run: |
        echo "=== portfolio.json (first 3 games) ==="
        head -100 portfolio.json
        echo ""
        echo "=== games_log.txt ==="
        tail -5 games_log.txt
        echo ""
        echo "=== last_run.txt ==="
        cat last_run.txt
        echo ""
        echo "=== SAR stats ==="
        cat sar_analysis.json | head -20
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add portfolio.json games_log.txt last_run.txt last_update.txt sar_analysis.json learning_data.json build_info.txt openai_cache.json 2>/dev/null || true
        git add workspace/ --force
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M')"
          git push
          echo "Changes pushed successfully"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: game-output
        path: |
          portfolio.json
          games_log.txt
          sar_analysis.json
          learning_data.json
          build_info.txt
          last_run.txt
          last_update.txt
          sprite.png
          workspace/
