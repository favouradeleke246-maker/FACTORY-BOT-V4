name: LevelForge+ Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  create-games:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pillow requests
    
    - name: Run Game Factory
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        GAME_PRICE: ${{ secrets.GAME_PRICE }}
      run: python levelforge_github.py
    
    - name: Ensure required files exist
      run: |
        # Create last_update.txt if it doesn't exist (prevents git error)
        touch last_update.txt
        # Create any other expected files that might be missing
        touch portfolio.json 2>/dev/null || true
        touch sar_analysis.json 2>/dev/null || true
        touch learning_data.json 2>/dev/null || true
        mkdir -p workspace
    
    - name: Commit and push all assets
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add all assets (last_update.txt now exists)
        git add last_update.txt portfolio.json sar_analysis.json learning_data.json last_hook.txt last_style.txt openai_cache.json recent_game_names.json build_info.txt 2>/dev/null || true
        git add workspace/ --force
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "✅ No changes to commit — portfolio already up to date"
        else
          git commit -m "Auto update: run ${{ github.run_number }} — $(date '+%Y-%m-%d %H:%M')"
          git push
          echo "✅ Changes pushed successfully"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: game-output
        path: |
          sprite.png
          portfolio.json
          build_info.txt
          learning_data.json
          sar_analysis.json
          workspace/
          last_hook.txt
          last_style.txt
          recent_game_names.json
