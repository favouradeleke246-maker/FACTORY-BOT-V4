name: LevelForge+ Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  create-games:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Pillow
      run: pip install pillow requests
    
    - name: Run Game Factory
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GITHUB_USERNAME: ${{ github.repository_owner }}
      run: python levelforge_github.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: game-output
        path: |
          sprite.png
          portfolio.json
          build_info.txt
