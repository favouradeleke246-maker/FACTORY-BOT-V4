name: LevelForge+ Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# THIS IS IMPORTANT - Add permissions
permissions:
  contents: write
  actions: read

jobs:
  create-games:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pillow requests
    
    - name: Run Game Factory
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        GAME_PRICE: ${{ secrets.GAME_PRICE }}
      run: python levelforge_github.py
    
    - name: Debug - Check if portfolio.json was created
      run: |
        echo "=== Current directory contents ==="
        ls -la
        echo ""
        echo "=== portfolio.json content (if exists) ==="
        cat portfolio.json 2>/dev/null || echo "portfolio.json does NOT exist!"
        echo ""
        echo "=== File timestamps ==="
        ls -la portfolio.json 2>/dev/null || echo "No portfolio.json"
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Force add all files
        git add -A
        git status
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "Changes pushed successfully"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: game-output
        path: |
          portfolio.json
          games_log.txt
          sar_analysis.json
          learning_data.json
          workspace/
