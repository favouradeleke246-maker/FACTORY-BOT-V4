name: DeathRoll Studio — Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      game_price:
        description: 'Override game price in SOL'
        required: false
        default: '7'
      force_genre:
        description: 'Force a specific genre (leave blank for auto)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  create-game:
    name: Build Daily Game
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install --upgrade pip && pip install pillow requests

      - name: Run Game Factory
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN:           ${{ secrets.GH_TOKEN }}
          GAME_PRICE:         ${{ github.event.inputs.game_price || secrets.GAME_PRICE || '7' }}
        run: python levelforge_github.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🎮 Auto update: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: game-output-${{ github.run_number }}
          retention-days: 30
          path: |
            portfolio.json
            games_log.txt
            sar_analysis.json
            learning_data.json
            build_info.txt
            sprite.png
            workspace/

  deploy-pages:
    name: Deploy Storefront to GitHub Pages
    needs: create-game
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cancel previous Pages deployment
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds/cancel
        continue-on-error: true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    name: Failure Alert
    needs: [create-game, deploy-pages]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure alert to Telegram
        run: |
          MESSAGE="⚠️ *DeathRoll Studio* — Build failed%0A%0ARun: \`${{ github.run_number }}\`%0ATime: $(date -u +'%Y-%m-%d %H:%M UTC')%0A%0ACheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" || true
