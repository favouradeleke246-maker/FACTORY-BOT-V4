name: DeathRoll Studio · Daily Game Factory v3

on:
  schedule:
    # Primary drop: 6 AM UTC daily
    - cron: '0 6 * * *'
    # Optional second drop: 6 PM UTC (disable by commenting out)
    # - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      games_per_run:
        description: 'Number of games to generate (1-5)'
        required: false
        default: '1'
        type: choice
        options: ['1','2','3','4','5']
      ai_provider:
        description: 'AI provider for generation'
        required: false
        default: 'anthropic'
        type: choice
        options: ['anthropic','openai','none']
      force_genre:
        description: 'Force a specific genre (leave empty for random)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-games:
    name: 🎮 Generate & Ship Games
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # ── Setup ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            Pillow==10.4.0 \
            requests==2.32.3 \
            python-telegram-bot==21.5

      # ── Run the bot ─────────────────────────────────
      - name: 🚀 Run DeathRoll Studio
        env:
          # Required secrets — add these in GitHub → Settings → Secrets → Actions
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ADMIN_ID:     ${{ secrets.TELEGRAM_ADMIN_ID }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK:       ${{ secrets.DISCORD_WEBHOOK }}
          TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SOL_WALLET:            ${{ secrets.SOL_WALLET }}
          # Config (non-secret, override as needed)
          GITHUB_PAGES_URL:      ${{ vars.GITHUB_PAGES_URL }}
          GAMES_PER_RUN:         ${{ github.event.inputs.games_per_run || '1' }}
          AI_PROVIDER:           ${{ github.event.inputs.ai_provider || 'anthropic' }}
          BASE_PRICE_SOL:        ${{ vars.BASE_PRICE_SOL || '0.05' }}
          USE_AI:                'true'
        run: python levelforge_github.py

      # ── Upload artifacts for debugging ──────────────
      - name: 📋 Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deathroll-logs-${{ github.run_id }}
          path: |
            games_log.txt
            sar_analysis.json
          retention-days: 30

      - name: 📦 Upload latest game workspace
        uses: actions/upload-artifact@v4
        with:
          name: latest-games-${{ github.run_id }}
          path: workspace/
          retention-days: 7

      # ── Commit & push results ────────────────────────
      - name: 📝 Commit generated games
        run: |
          git config --global user.name "DeathRoll Studio Bot"
          git config --global user.email "bot@deathroll.studio"
          git add -A
          git status
          GAME_COUNT=$(python -c "import json; p=json.load(open('portfolio.json')); print(p['stats']['total_games'])" 2>/dev/null || echo "?")
          git commit -m "🎮 Daily drop #${GAME_COUNT} — $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push origin HEAD || echo "Push failed (no changes)"

      # ── Deploy to GitHub Pages ───────────────────────
      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.py,*.yml,*.txt,*.json'
          commit_message: "🚀 Deploy game store — ${{ github.run_id }}"

      # ── Health check ────────────────────────────────
      - name: ✅ Run health check
        if: always()
        run: |
          echo "═══ DeathRoll Studio Run Summary ═══"
          echo "Run ID:     ${{ github.run_id }}"
          echo "Timestamp:  $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Trigger:    ${{ github.event_name }}"
          if [ -f portfolio.json ]; then
            python -c "
          import json
          p = json.load(open('portfolio.json'))
          s = p.get('stats', {})
          print(f\"Total games: {s.get('total_games', 0)}\")
          print(f\"Total revenue: {s.get('total_revenue_sol', 0):.4f} SOL\")
          print(f\"Genres: {list(s.get('genres_generated', {}).keys())}\")
          "
          fi

  # ── Optional: Weekly analytics report ─────────────────
  weekly-report:
    name: 📊 Weekly Analytics
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: generate-games
    # Only runs on Sundays
    # Add: `&& github.event.schedule == '0 6 * * 0'` for Sunday-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate weekly report
        run: |
          python -c "
          import json, datetime
          portfolio = json.load(open('portfolio.json')) if __import__('os').path.exists('portfolio.json') else {}
          stats = portfolio.get('stats', {})
          games = portfolio.get('games', [])
          week_ago = (datetime.datetime.utcnow() - datetime.timedelta(days=7)).strftime('%Y-%m-%d')
          recent = [g for g in games if g.get('date','') >= week_ago]
          print(f'=== Weekly Report ===')
          print(f'Games this week: {len(recent)}')
          print(f'Total games: {stats.get(\"total_games\", 0)}')
          print(f'Total revenue: {stats.get(\"total_revenue_sol\", 0):.4f} SOL')
          genres = {}
          for g in recent:
              genres[g[\"genre\"]] = genres.get(g[\"genre\"], 0) + 1
          print(f'Genres this week: {genres}')
          "
