name: LevelForge+ Daily Game Factory

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  create-games:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pillow requests
    
    - name: Run Game Factory
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        GAME_PRICE: ${{ secrets.GAME_PRICE }}
      run: python levelforge_github.py
    
    - name: Debug files
      run: |
        echo "=== portfolio.json ==="
        cat portfolio.json 2>/dev/null || echo "NOT FOUND"
        echo "=== workspace/ ==="
        ls -la workspace/ 2>/dev/null || echo "NOT FOUND"
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add portfolio.json sar_analysis.json learning_data.json last_hook.txt last_style.txt 2>/dev/null || true
        git add workspace/ --force
        git diff --staged --quiet || git commit -m "Auto update: ${{ github.run_number }}"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: game-output
        path: |
          sprite.png
          portfolio.json
          workspace/
